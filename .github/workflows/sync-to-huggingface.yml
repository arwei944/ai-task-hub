name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  sync-to-hf:
    name: Sync to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add HuggingFace remote and push
        run: |
          git remote add hf https://arwei944:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/arwei944/ai-task-hub
          git push hf main --force

name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/workflows/sync-to-huggingface.yml'
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.25.0"

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          python3 << 'PYEOF'
          import os, shutil, glob
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ.get("HF_REPO", "arwei944/ai-task-hub")
          api = HfApi(token=token)

          # Ensure Space exists
          try:
              api.repo_info(repo_id=repo_id, repo_type="space")
              print(f"✓ Space {repo_id} exists")
          except Exception:
              api.create_repo(
                  repo_id=repo_id, repo_type="space",
                  space_sdk="docker", private=False, exist_ok=True,
              )
              print(f"✓ Space {repo_id} created")

          # Prepare deploy directory
          deploy_dir = "/tmp/hf-deploy"
          if os.path.exists(deploy_dir):
              shutil.rmtree(deploy_dir)
          os.makedirs(deploy_dir)

          exclude = {
              ".git", "node_modules", ".next", "test-db", "backups",
              "*.db", "*.db-journal", ".github", "tests", ".husky",
              ".prettier*", ".eslintrc*", "vitest.config.*",
              "playwright.config.*", "coverage", "playwright-report",
              "test-results", ".vscode", ".idea", "*.log",
          }

          for item in os.listdir("."):
              if any(item.startswith(e.rstrip("*")) or item == e for e in exclude):
                  continue
              if item.endswith((".md",)) and item not in ("README.md",):
                  continue
              src = os.path.join(".", item)
              dst = os.path.join(deploy_dir, item)
              if os.path.isdir(src):
                  shutil.copytree(src, dst)
              else:
                  shutil.copy2(src, dst)

          # Count files
          file_count = sum(len(files) for _, _, files in os.walk(deploy_dir))
          print(f"✓ Prepared {file_count} files for deployment")

          # Upload entire folder at once
          api.upload_folder(
              folder_path=deploy_dir,
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"deploy: {os.environ.get('GITHUB_SHA', 'manual')[:7]}",
              delete_patterns=["*"],  # Clean old files not in new upload
          )
          print(f"✓ Uploaded {file_count} files to {repo_id}")
          PYEOF

      - name: Trigger HF rebuild
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = os.environ.get('HF_REPO', 'arwei944/ai-task-hub')
          try:
              api.restart_space(repo_id=repo)
              print(f'✓ HF Space rebuild triggered: {repo}')
          except Exception as e:
              print(f'✓ Restart triggered (or already building): {e}')
          "

      - name: Deployment summary
        if: always()
        run: |
          echo "## HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

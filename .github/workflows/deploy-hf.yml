name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/workflows/sync-to-huggingface.yml'
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.25.0"

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          python3 << 'PYEOF'
          import os, shutil
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ.get("HF_REPO", "arwei944/ai-task-hub")
          api = HfApi(token=token)

          # Ensure Space exists
          try:
              api.repo_info(repo_id=repo_id, repo_type="space")
              print(f"✓ Space {repo_id} exists")
          except Exception:
              api.create_repo(
                  repo_id=repo_id, repo_type="space",
                  space_sdk="docker", private=False, exist_ok=True,
              )
              print(f"✓ Space {repo_id} created")

          # Prepare deploy directory (exclude unnecessary files)
          deploy_dir = "/tmp/hf-deploy"
          if os.path.exists(deploy_dir):
              shutil.rmtree(deploy_dir)
          os.makedirs(deploy_dir)

          skip = {
              ".git", "node_modules", ".next", "test-db", "backups",
              "*.db", "*.db-journal", ".github", "tests", ".husky",
              ".prettier*", ".eslintrc*", "vitest.config.*",
              "playwright.config.*", "coverage", "playwright-report",
              "test-results", ".vscode", ".idea", "*.log",
          }

          for item in os.listdir("."):
              if any(item.startswith(e.rstrip("*")) or item == e for e in skip):
                  continue
              if item.endswith(".md") and item != "README.md":
                  continue
              s = os.path.join(".", item)
              d = os.path.join(deploy_dir, item)
              if os.path.isdir(s):
                  shutil.copytree(s, d)
              else:
                  shutil.copy2(s, d)

          # Upload in 3 batches to avoid size limits
          batches = [
              ("1_config", ["package.json", "pnpm-lock.yaml", ".gitignore",
                           ".gitattributes", ".env.example", "Dockerfile",
                           "start.sh", "next.config.*", "tailwind.config.*",
                           "postcss.config.*", "prisma.config.*", "tsconfig.json"]),
              ("2_source", ["prisma/**", "public/**", "src/**", "mcp-server/**", "config/**"]),
              ("3_assets", ["plugins/**"]),
          ]

          import glob
          total = 0
          for batch_name, patterns in batches:
              batch_dir = f"/tmp/hf-batch-{batch_name}"
              if os.path.exists(batch_dir):
                  shutil.rmtree(batch_dir)
              os.makedirs(batch_dir)

              for pattern in patterns:
                  for f in glob.glob(f"{deploy_dir}/{pattern}", recursive=True):
                      if os.path.isfile(f):
                          rel = os.path.relpath(f, deploy_dir)
                          dest = os.path.join(batch_dir, rel)
                          os.makedirs(os.path.dirname(dest), exist_ok=True)
                          shutil.copy2(f, dest)

              count = sum(len(files) for _, _, files in os.walk(batch_dir))
              if count == 0:
                  print(f"  Batch '{batch_name}': empty, skip")
                  continue

              api.upload_folder(
                  folder_path=batch_dir,
                  repo_id=repo_id,
                  repo_type="space",
                  commit_message=f"deploy({batch_name}): {os.environ.get('GITHUB_SHA', 'manual')[:7]}",
              )
              total += count
              print(f"  ✓ Batch '{batch_name}': {count} files")

          print(f"✓ Total: {total} files uploaded to {repo_id}")
          PYEOF

      - name: Trigger HF rebuild
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = os.environ.get('HF_REPO', 'arwei944/ai-task-hub')
          try:
              api.restart_space(repo_id=repo)
              print(f'✓ HF Space rebuild triggered: {repo}')
          except Exception as e:
              print(f'✓ Restart triggered (or already building): {e}')
          "

      - name: Deployment summary
        if: always()
        run: |
          echo "## HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

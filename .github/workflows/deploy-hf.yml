name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/workflows/sync-to-huggingface.yml'
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.25.0"

      - name: Fix pnpm-lock.yaml if LFS pointer
        run: |
          if head -1 pnpm-lock.yaml | grep -q "version https://git-lfs.github.com/spec/v1"; then
            echo "pnpm-lock.yaml is an LFS pointer, regenerating..."
            corepack enable pnpm
            pnpm install --no-frozen-lockfile
            echo "✓ pnpm-lock.yaml regenerated"
          else
            echo "✓ pnpm-lock.yaml is valid"
          fi

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          python3 << 'PYEOF'
          import os, shutil, glob, time
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ.get("HF_REPO", "arwei944/ai-task-hub")
          api = HfApi(token=token)

          # Ensure Space exists (create only if missing, never delete)
          # This avoids hitting HF's daily Space creation rate limit (20/day)
          try:
              api.create_repo(
                  repo_id=repo_id, repo_type="space",
                  space_sdk="docker", private=False, exist_ok=True,
              )
              print(f"✓ Space {repo_id} ready (created or already exists)")
          except Exception as e:
              err_msg = str(e)
              if "429" in err_msg or "rate limit" in err_msg:
                  print(f"✗ Rate limited: {err_msg}")
                  print("  The Space likely already exists, trying to continue...")
              else:
                  raise

          # Verify Space is accessible
          try:
              info = api.space_info(repo_id=repo_id)
              print(f"  Space SDK: {info.sdk} | Runtime: {info.runtime}")
          except Exception as e:
              print(f"  Warning: could not verify space info: {e}")

          # Prepare deploy directory
          deploy_dir = "/tmp/hf-deploy"
          if os.path.exists(deploy_dir):
              shutil.rmtree(deploy_dir)
          os.makedirs(deploy_dir)

          skip = {
              ".git", "node_modules", ".next", "test-db", "backups",
              "*.db", "*.db-journal", ".github", "tests", ".husky",
              ".prettier*", ".eslintrc*", "vitest.config.*",
              "playwright.config.*", "coverage", "playwright-report",
              "test-results", ".vscode", ".idea", "*.log",
          }

          for item in os.listdir("."):
              if any(item.startswith(e.rstrip("*")) or item == e for e in skip):
                  continue
              if item.endswith(".md") and item != "README.md":
                  continue
              s = os.path.join(".", item)
              d = os.path.join(deploy_dir, item)
              if os.path.isdir(s):
                  shutil.copytree(s, d)
              else:
                  shutil.copy2(s, d)

          # Use Dockerfile.hf as Dockerfile for HF Spaces
          dockerfile_hf = os.path.join(deploy_dir, "Dockerfile.hf")
          dockerfile = os.path.join(deploy_dir, "Dockerfile")
          if os.path.exists(dockerfile_hf):
              shutil.copy2(dockerfile_hf, dockerfile)
              print("✓ Using Dockerfile.hf as Dockerfile")
          elif not os.path.exists(dockerfile):
              print("✗ WARNING: No Dockerfile found!")

          # Use README.hf.md as README.md for HF Spaces
          readme_hf = os.path.join(deploy_dir, "README.hf.md")
          readme = os.path.join(deploy_dir, "README.md")
          if os.path.exists(readme_hf):
              shutil.copy2(readme_hf, readme)
              print("✓ Using README.hf.md as README.md")

          # Remove ALL LFS rules from .gitattributes
          ga_path = os.path.join(deploy_dir, ".gitattributes")
          if os.path.exists(ga_path):
              with open(ga_path) as f:
                  lines = f.readlines()
              safe_lines = [l for l in lines if "filter=lfs" not in l]
              with open(ga_path, "w") as f:
                  f.writelines(safe_lines)
              print(f"  Cleaned .gitattributes: removed {len(lines) - len(safe_lines)} LFS rules")

          # Verify pnpm-lock.yaml is not an LFS pointer
          lock_path = os.path.join(deploy_dir, "pnpm-lock.yaml")
          if os.path.exists(lock_path):
              with open(lock_path) as f:
                  first_line = f.readline().strip()
              if first_line.startswith("version https://git-lfs.github.com/spec/v1"):
                  print("✗ ERROR: pnpm-lock.yaml is still an LFS pointer! Aborting.")
                  raise SystemExit(1)
              else:
                  print(f"✓ pnpm-lock.yaml is valid ({os.path.getsize(lock_path)} bytes)")

          # Upload in batches
          batches = [
              ("1_config", ["package.json", "pnpm-lock.yaml", ".gitignore",
                           ".gitattributes", ".env.example", "Dockerfile",
                           "start.sh", "next.config.*", "tailwind.config.*",
                           "postcss.config.*", "prisma.config.*", "tsconfig.json"]),
              ("2_source", ["prisma/**", "public/**", "src/**", "mcp-server/**", "config/**"]),
              ("3_assets", ["plugins/**"]),
          ]

          total = 0
          for batch_name, patterns in batches:
              batch_dir = f"/tmp/hf-batch-{batch_name}"
              if os.path.exists(batch_dir):
                  shutil.rmtree(batch_dir)
              os.makedirs(batch_dir)

              for pattern in patterns:
                  for f in glob.glob(f"{deploy_dir}/{pattern}", recursive=True):
                      if os.path.isfile(f):
                          rel = os.path.relpath(f, deploy_dir)
                          dest = os.path.join(batch_dir, rel)
                          os.makedirs(os.path.dirname(dest), exist_ok=True)
                          shutil.copy2(f, dest)

              count = sum(len(files) for _, _, files in os.walk(batch_dir))
              if count == 0:
                  print(f"  Batch '{batch_name}': empty, skip")
                  continue

              api.upload_folder(
                  folder_path=batch_dir,
                  repo_id=repo_id,
                  repo_type="space",
                  commit_message=f"deploy({batch_name}): {os.environ.get('GITHUB_SHA', 'manual')[:7]}",
              )
              total += count
              print(f"  ✓ Batch '{batch_name}': {count} files")

          print(f"✓ Total: {total} files uploaded to {repo_id}")
          PYEOF

      - name: Trigger HF rebuild
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          sleep 5
          python3 -c "
          from huggingface_hub import HfApi
          import os, time
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = os.environ.get('HF_REPO', 'arwei944/ai-task-hub')
          try:
              api.restart_space(repo_id=repo)
              print(f'✓ HF Space rebuild triggered: {repo}')
          except Exception as e:
              print(f'✓ Restart triggered (or already building): {e}')
          "

      - name: Deployment summary
        if: always()
        run: |
          echo "## HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

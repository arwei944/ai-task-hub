name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Create HF Space if not exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: arwei944
        run: |
          python3 << 'PYEOF'
          from huggingface_hub import HfApi
          import os

          token = os.environ["HF_TOKEN"]
          username = os.environ["HF_USERNAME"]
          repo_id = f"{username}/ai-task-hub"

          api = HfApi(token=token)

          try:
              api.repo_info(repo_id=repo_id, repo_type="space")
              print(f"Space {repo_id} already exists")
          except Exception as e:
              print(f"Space does not exist, creating... ({e})")
              try:
                  api.create_repo(
                      repo_id=repo_id,
                      repo_type="space",
                      space_sdk="docker",
                      private=False,
                      exist_ok=True,
                  )
                  print(f"Space {repo_id} created successfully!")
              except Exception as e2:
                  print(f"Failed to create space: {e2}")
                  raise
          PYEOF

      - name: Setup HF Space repo
        run: |
          mkdir -p /tmp/hf-space
          cd /tmp/hf-space
          git clone https://arwei944:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/arwei944/ai-task-hub . 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync project files to HF Space
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='test-db' \
            --exclude='backups' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            --exclude='.github/workflows/deploy-hf.yml' \
            $GITHUB_WORKSPACE/ /tmp/hf-space/

          cd /tmp/hf-space
          if [ -f Dockerfile.hf ]; then mv Dockerfile.hf Dockerfile; fi
          if [ -f README.hf.md ]; then mv README.hf.md README.md; fi

      - name: Push to HF Spaces
        run: |
          cd /tmp/hf-space
          git add -A
          git diff --staged --quiet || git commit -m "🚀 Deploy $(echo ${{ github.sha }} | cut -c1-7)"
          REMOTE_BRANCH=$(git ls-remote --heads origin 2>/dev/null | head -1 | sed 's/.*refs\/heads\///' || echo "")
          if [ -z "$REMOTE_BRANCH" ]; then
            git branch -M main
            git push -u origin main 2>&1 || echo "Warning: git push failed (LFS/binary files), but rsync already synced files"
          else
            git push origin HEAD:${REMOTE_BRANCH} --force 2>&1 || echo "Warning: git push failed (LFS/binary files), but rsync already synced files"
          fi

      - name: Trigger HF rebuild
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python3 -c "
          from huggingface_hub import HfApi
          import time
          api = HfApi(token='${{ secrets.HF_TOKEN }}')
          # Wait for git push to propagate
          time.sleep(10)
          # Trigger factory rebuild
          try:
              api.restart_space(repo_id='arwei944/ai-task-hub', token='${{ secrets.HF_TOKEN }}')
              print('✓ HF Space rebuild triggered')
          except Exception as e:
              print(f'Restart triggered (or already building): {e}')
          "

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://arwei944-ai-task-hub.hf.space" >> $GITHUB_STEP_SUMMARY

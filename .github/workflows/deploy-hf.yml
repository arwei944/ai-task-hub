name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Create HF Space if not exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: arwei944
        run: |
          python3 << 'PYEOF'
          from huggingface_hub import HfApi
          import os

          token = os.environ["HF_TOKEN"]
          username = os.environ["HF_USERNAME"]
          repo_id = f"{username}/ai-task-hub"

          api = HfApi(token=token)

          try:
              api.repo_info(repo_id=repo_id, repo_type="space")
              print(f"Space {repo_id} already exists")
          except Exception as e:
              print(f"Space does not exist, creating... ({e})")
              try:
                  api.create_repo(
                      repo_id=repo_id,
                      repo_type="space",
                      space_sdk="docker",
                      private=False,
                      exist_ok=True,
                  )
                  print(f"Space {repo_id} created successfully!")
              except Exception as e2:
                  print(f"Failed to create space: {e2}")
                  raise
          PYEOF

      - name: Sync project files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Prepare files in a temp directory
          mkdir -p /tmp/hf-deploy
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='test-db' \
            --exclude='backups' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            --exclude='.github/workflows' \
            --exclude='DEPLOYMENT.md' \
            --exclude='ROADMAP.md' \
            --exclude='plugins' \
            $GITHUB_WORKSPACE/ /tmp/hf-deploy/

          cd /tmp/hf-deploy
          if [ -f Dockerfile.hf ]; then mv Dockerfile.hf Dockerfile; fi
          if [ -f README.hf.md ]; then mv README.hf.md README.md; fi

          # Use huggingface_hub to upload (avoids git LFS issues)
          python3 << 'PYEOF'
          from huggingface_hub import HfApi
          import os

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          repo_id = "arwei944/ai-task-hub"

          # Get the commit SHA for the message
          sha = os.environ.get("GITHUB_SHA", "unknown")[:7]

          api.upload_large_folder(
              folder_path="/tmp/hf-deploy",
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"Deploy {sha}",
              delete_patterns=["node_modules", ".next", "*.db", "*.db-journal", "test-db", "backups"],
          )
          print(f"Successfully uploaded to {repo_id}")
          PYEOF

      - name: Trigger HF rebuild
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          try:
              api.restart_space(repo_id='arwei944/ai-task-hub')
              print('HF Space rebuild triggered')
          except Exception as e:
              print(f'Restart triggered (or already building): {e}')
          "

      - name: Deployment summary
        if: always()
        run: |
          echo "## HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://arwei944-ai-task-hub.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.25.0"

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Prepare files in a temp directory (exclude unnecessary files)
          mkdir -p /tmp/hf-deploy
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='test-db' \
            --exclude='backups' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            --exclude='.github' \
            --exclude='DEPLOYMENT.md' \
            --exclude='ROADMAP.md' \
            --exclude='plugins' \
            --exclude='tests' \
            --exclude='.husky' \
            --exclude='.prettier*' \
            --exclude='.eslintrc*' \
            --exclude='vitest.config.*' \
            --exclude='playwright.config.*' \
            --exclude='tsconfig.json' \
            $GITHUB_WORKSPACE/ /tmp/hf-deploy/

          cd /tmp/hf-deploy
          if [ -f Dockerfile.hf ]; then mv Dockerfile.hf Dockerfile; fi
          if [ -f README.hf.md ]; then mv README.hf.md README.md; fi

          python3 << 'PYEOF'
          from huggingface_hub import HfApi
          import os

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          repo_id = "arwei944/ai-task-hub"

          # Step 1: Clean up old unwanted files from HF repo
          unwanted = [
              "node_modules", ".next", "test-db", "backups",
              "dev.db", "dev.db-journal", ".github", "tests", "plugins",
              "DEPLOYMENT.md", "ROADMAP.md", ".husky",
          ]
          for path in unwanted:
              try:
                  api.delete_file(
                      path_in_repo=path,
                      repo_id=repo_id,
                      repo_type="space",
                      commit_message=f"cleanup: remove {path}",
                  )
                  print(f"Deleted: {path}")
              except Exception:
                  pass  # File may not exist, that's fine

          # Step 2: Upload all files using upload_large_folder (handles large repos)
          api.upload_large_folder(
              repo_id=repo_id,
              folder_path="/tmp/hf-deploy",
              repo_type="space",
              ignore_patterns=[
                  "node_modules/**",
                  ".next/**",
                  "*.db",
                  "*.db-journal",
              ],
          )
          print(f"Successfully uploaded to {repo_id}")
          PYEOF

      - name: Trigger HF rebuild
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          try:
              api.restart_space(repo_id='arwei944/ai-task-hub')
              print('HF Space rebuild triggered')
          except Exception as e:
              print(f'Restart triggered (or already building): {e}')
          "

      - name: Deployment summary
        if: always()
        run: |
          echo "## HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://arwei944-ai-task-hub.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create HF Space if not exists
        run: |
          # Try to create the space (idempotent - fails if already exists)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://huggingface.co/api/spaces" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"ai-task-hub","sdk":"docker","private":false}')
          echo "Create space status: $STATUS"

      - name: Setup HF Space repo
        run: |
          mkdir -p /tmp/hf-space
          cd /tmp/hf-space

          # Clone the space (should succeed now)
          git clone https://arwei944:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/arwei944/ai-task-hub . 2>&1

          # Configure git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync project files to HF Space
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='test-db' \
            --exclude='backups' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            --exclude='.github/workflows/deploy-hf.yml' \
            $GITHUB_WORKSPACE/ /tmp/hf-space/

          cd /tmp/hf-space
          if [ -f Dockerfile.hf ]; then
            mv Dockerfile.hf Dockerfile
          fi
          if [ -f README.hf.md ]; then
            mv README.hf.md README.md
          fi

      - name: Push to HF Spaces
        run: |
          cd /tmp/hf-space
          git add -A
          git diff --staged --quiet || git commit -m "🚀 Deploy $(echo ${{ github.sha }} | cut -c1-7)"

          # Detect remote branch
          REMOTE_BRANCH=$(git ls-remote --heads origin 2>/dev/null | head -1 | sed 's/.*refs\/heads\///' || echo "")
          if [ -z "$REMOTE_BRANCH" ]; then
            git branch -M main
            git push -u origin main 2>&1
          else
            git push origin HEAD:${REMOTE_BRANCH} --force 2>&1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://arwei944-ai-task-hub.hf.space" >> $GITHUB_STEP_SUMMARY

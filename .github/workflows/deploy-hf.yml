name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup HF Space repo
        run: |
          mkdir -p /tmp/hf-space
          cd /tmp/hf-space

          # Try to clone existing space
          if git clone https://arwei944:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/arwei944/ai-task-hub . 2>&1; then
            echo "Cloned existing HF Space"
          else
            echo "Creating new HF Space repo"
            git init
            git remote add origin https://arwei944:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/arwei944/ai-task-hub
          fi

          # Configure git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync project files to HF Space
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='test-db' \
            --exclude='backups' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            --exclude='.github/workflows/deploy-hf.yml' \
            $GITHUB_WORKSPACE/ /tmp/hf-space/

          cd /tmp/hf-space
          if [ -f Dockerfile.hf ]; then
            mv Dockerfile.hf Dockerfile
          fi
          if [ -f README.hf.md ]; then
            mv README.hf.md README.md
          fi

      - name: Push to HF Spaces
        run: |
          cd /tmp/hf-space
          git add -A
          git diff --staged --quiet || git commit -m "🚀 Deploy $(echo ${{ github.sha }} | cut -c1-7)"

          # Determine remote branch name
          REMOTE_BRANCH=$(git ls-remote --heads origin 2>/dev/null | head -1 | sed 's/.*refs\/heads\///' || echo "")
          if [ -z "$REMOTE_BRANCH" ]; then
            # New repo - push main and set upstream
            git branch -M main
            git push -u origin main 2>&1
          else
            # Existing repo - push to whatever branch exists
            git push origin HEAD:${REMOTE_BRANCH} --force 2>&1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://arwei944-ai-task-hub.hf.space" >> $GITHUB_STEP_SUMMARY

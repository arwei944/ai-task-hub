name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/workflows/sync-to-huggingface.yml'
  workflow_dispatch:

jobs:
  deploy-hf:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.25.0"

      - name: Deploy to HF Space via git push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          python3 << 'PYEOF'
          import os, shutil, subprocess
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ.get("HF_REPO", "arwei944/ai-task-hub")
          api = HfApi(token=token)

          # Ensure Space exists with Docker SDK
          try:
              info = api.repo_info(repo_id=repo_id, repo_type="space")
              print(f"✓ Space {repo_id} exists")
          except Exception:
              api.create_repo(
                  repo_id=repo_id, repo_type="space",
                  space_sdk="docker", private=False, exist_ok=True,
              )
              print(f"✓ Space {repo_id} created")

          # Prepare a clean deploy directory
          deploy_dir = "/tmp/hf-push"
          if os.path.exists(deploy_dir):
              shutil.rmtree(deploy_dir)

          # Clone HF Space repo (shallow, with credential helper)
          hf_url = f"https://huggingface.co/{repo_id}"
          # Use git credential store for auth
          cred_dir = "/tmp/.hf-git"
          os.makedirs(cred_dir, exist_ok=True)
          with open(os.path.join(cred_dir, "credentials"), "w") as f:
              f.write(f"https://user:{token}@huggingface.co\n")
          result = subprocess.run(
              ["git", "clone", "--depth", "1", "--branch", "main",
               hf_url, deploy_dir],
              env={
                  **os.environ,
                  "GIT_LFS": "0",
                  "GIT_TERMINAL_PROMPT": "0",
                  "GIT_CONFIG_COUNT": "1",
                  "GIT_CONFIG_KEY_0": "credential.helper",
                  "GIT_CONFIG_VALUE_0": f"store --file={cred_dir}/credentials",
              },
              capture_output=True, text=True,
          )
          if result.returncode != 0:
              print(f"Clone stderr: {result.stderr}")
              raise Exception(f"git clone failed: {result.stderr}")
          print("✓ Cloned HF Space")

          # Clear old files (keep .git)
          for item in os.listdir(deploy_dir):
              if item != ".git":
                  p = os.path.join(deploy_dir, item)
                  if os.path.isdir(p):
                      shutil.rmtree(p)
                  else:
                      os.remove(p)

          # Copy project files (exclude unnecessary)
          skip = {
              ".git", "node_modules", ".next", "test-db", "backups",
              "*.db", "*.db-journal", ".github", "tests", ".husky",
              ".prettier*", ".eslintrc*", "vitest.config.*",
              "playwright.config.*", "coverage", "playwright-report",
              "test-results", ".vscode", ".idea", "*.log",
          }

          for item in os.listdir("."):
              if any(item.startswith(e.rstrip("*")) or item == e for e in skip):
                  continue
              if item.endswith(".md") and item != "README.md":
                  continue
              s = os.path.join(".", item)
              d = os.path.join(deploy_dir, item)
              if os.path.isdir(s):
                  shutil.copytree(s, d)
              else:
                  shutil.copy2(s, d)

          # Ensure .gitattributes does NOT track pnpm-lock.yaml as LFS
          ga_path = os.path.join(deploy_dir, ".gitattributes")
          if os.path.exists(ga_path):
              with open(ga_path) as f:
                  lines = [l for l in f if "pnpm-lock" not in l]
              with open(ga_path, "w") as f:
                  f.writelines(lines)

          # Remove any LFS tracking config
          lfs_dir = os.path.join(deploy_dir, ".git", "lfs")
          if os.path.exists(lfs_dir):
              shutil.rmtree(lfs_dir)
          attrs_file = os.path.join(deploy_dir, ".git", "attributes")
          if os.path.exists(attrs_file):
              os.remove(attrs_file)

          # Configure git remote with auth
          subprocess.run(
              ["git", "remote", "set-url", "origin", f"https://user:{token}@huggingface.co/{repo_id}"],
              cwd=deploy_dir, check=True, capture_output=True,
          )

          # Git push
          subprocess.run(["git", "add", "-A"], cwd=deploy_dir, check=True)
          subprocess.run(
              ["git", "commit", "-m",
               f"deploy: {os.environ.get('GITHUB_SHA', 'manual')[:7]}"],
              cwd=deploy_dir, check=True, capture_output=True,
          )
          result = subprocess.run(
              ["git", "push", "origin", "main"],
              cwd=deploy_dir, capture_output=True, text=True,
              env={
                  **os.environ, "GIT_LFS": "0",
              },
          )
          if result.returncode != 0:
              print(f"Push output: {result.stdout}")
              print(f"Push stderr: {result.stderr}")
              raise Exception(f"git push failed with code {result.returncode}")

          print(f"✓ Deployed to {repo_id}")
          PYEOF

      - name: Trigger HF rebuild
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = os.environ.get('HF_REPO', 'arwei944/ai-task-hub')
          try:
              api.restart_space(repo_id=repo)
              print(f'✓ HF Space rebuild triggered: {repo}')
          except Exception as e:
              print(f'✓ Restart triggered (or already building): {e}')
          "

      - name: Deployment summary
        if: always()
        run: |
          echo "## HF Spaces Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://${{ vars.HF_REPO || 'arwei944/ai-task-hub' }}.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
